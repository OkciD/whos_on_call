info:
  name: Get call status for all users
  type: http
  seq: 1
  tags:
    - Call Status

http:
  method: GET
  url: "{{baseUrl}}/api/v1/status"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful response
    request:
      url: "{{baseUrl}}/api/v1/status"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "user": {
                "id": 1,
                "name": "John Doe"
              },
              "state": "active",
              "devices": [
                {
                  "id": 1,
                  "name": "MacBook Pro",
                  "type": "laptop",
                  "features": [
                    {
                      "id": 1,
                      "type": "mic",
                      "status": "active",
                      "lastActive": "2026-04-01T01:00:00Z"
                    },
                    {
                      "id": 2,
                      "type": "camera",
                      "status": "inactive"
                    }
                  ]
                }
              ]
            }
          ]
  - name: 401 Response
    description: Unauthorized - invalid or missing API key
    request:
      url: "{{baseUrl}}/api/v1/status"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "err_code": "unauthorized"
          }
  - name: 500 Response
    description: Internal server error
    request:
      url: "{{baseUrl}}/api/v1/status"
      method: GET
    response:
      status: 500
      statusText: Internal Server Error
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "err_code": "internal"
          }

docs: Returns the current call status including all users, their devices and device features
