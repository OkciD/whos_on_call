info:
  name: Upsert device feature
  type: http
  seq: 1
  tags:
    - Device Feature

http:
  method: POST
  url: "{{baseUrl}}/device/:deviceid/feature"
  params:
    - name: deviceid
      value: "1"
      type: path
      description: Device ID
  body:
    type: json
    data: |-
      {
        "type": "mic",
        "status": "active"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Device feature upserted successfully
    request:
      url: "{{baseUrl}}/device/:deviceid/feature"
      method: POST
      params:
        - name: deviceid
