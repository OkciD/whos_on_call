          type: path
          description: Device ID
      body:
        type: json
        data: |-
          {
            "type": "mic",
            "status": "active"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
