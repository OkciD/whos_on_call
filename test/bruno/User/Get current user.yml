info:
  name: Get current user
  type: http
  seq: 1
  tags:
    - User

http:
  method: GET
  url: "{{baseUrl}}/user"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful response
    request:
      url: "{{baseUrl}}/user"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 1,
            "name": "John Doe"
          }
  - name: 401 Response
    description: Unauthorized - invalid or missing API key
    request:
      url: "{{baseUrl}}/user"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "err_code": "unauthorized"
          }
  - name: 500 Response
    description: Internal server error
    request:
      url: "{{baseUrl}}/user"
      method: GET
    response:
      status: 500
      statusText: Internal Server Error
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "err_code": "internal"
          }

docs: Returns the authenticated user information
