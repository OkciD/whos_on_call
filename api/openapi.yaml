openapi: "3.0.3"
info:
  title: "Who's On Call API"
  description: "API for managing devices, device features, and call status"
  version: "1.0.0"

security:
  - ApiKeyAuth: []

paths:
  /api/v1/status:
    get:
      summary: "Get call status for all users"
      description: "Returns the current call status including all users, their devices and device features"
      operationId: "getStatus"
      tags:
        - "Call Status"
      responses:
        "200":
          description: "Successful response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallStatus"
              example:
                - user:
                    id: 1
                    name: "John Doe"
                  state: "active"
                  devices:
                    - id: 1
                      name: "MacBook Pro"
                      type: "laptop"
                      features:
                        - id: 1
                          type: "mic"
                          status: "active"
                          lastActive: "2026-04-01T01:00:00Z"
                        - id: 2
                          type: "camera"
                          status: "inactive"
        "401":
          description: "Unauthorized - invalid or missing API key"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                err_code: "unauthorized"
        "500":
          description: "Internal server error"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                err_code: "internal"

  /api/v1/user:
    get:
      summary: "Get current user"
      description: "Returns the authenticated user information"
      operationId: "getUser"
      tags:
        - "User"
      responses:
        "200":
          description: "Successful response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
              example:
                id: 1
                name: "John Doe"
        "401":
          description: "Unauthorized - invalid or missing API key"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                err_code: "unauthorized"
        "500":
          description: "Internal server error"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                err_code: "internal"

  /api/v1/device:
    post:
      summary: "Create a new device"
      description: "Creates a new device for the authenticated user"
      operationId: "createDevice"
      tags:
        - "Device"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceInput"
            example:
              name: "MacBook Pro"
              type: "laptop"
      responses:
        "201":
          description: "Device created successfully"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"
              example:
                id: 1
                name: "MacBook Pro"
                type: "laptop"
        "400":
          description: "Bad request - invalid JSON or invalid device type"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                badJson:
                  value:
                    err_code: "bad json"
                invalidType:
                  value:
                    err_code: "invalid device type"
        "401":
          description: "Unauthorized - invalid or missing API key"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                err_code: "unauthorized"
        "500":
          description: "Internal server error"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                err_code: "internal"

  /api/v1/device/{deviceid}/feature:
    put:
      summary: "Upsert device feature"
      description: "Creates or updates a device feature for the specified device"
      operationId: "upsertDeviceFeature"
      tags:
        - "Device Feature"
      parameters:
        - name: deviceid
          in: path
          required: true
          description: "Device ID"
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceFeatureInput"
            example:
              type: "mic"
              status: "active"
      responses:
        "200":
          description: "Device feature upserted successfully"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceFeature"
              example:
                id: 1
                type: "mic"
                status: "active"
                lastActive: "2026-04-01T01:00:00Z"
        "400":
          description: "Bad request - invalid JSON, invalid device ID, or invalid feature type/status"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                badJson:
                  value:
                    err_code: "bad json"
                invalidUrlParam:
                  value:
                    err_code: "invalid url param"
                invalidFeatureType:
                  value:
                    err_code: "invalid device feature type"
                invalidFeatureStatus:
                  value:
                    err_code: "invalid device feature status"
        "401":
          description: "Unauthorized - invalid or missing API key"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                err_code: "unauthorized"
        "404":
          description: "Device feature not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                err_code: "not found"
        "500":
          description: "Internal server error"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                err_code: "internal"

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Key
      description: "API key for authentication"

  schemas:
    User:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int32
          description: "User ID"
        name:
          type: string
          description: "User name"

    DeviceType:
      type: string
      enum:
        - laptop
        - mobile
        - pc
      x-enum-varnames:
        - DeviceTypeLaptop
        - DeviceTypeMobile
        - DeviceTypePC
      description: "Device type"

    Device:
      type: object
      required:
        - id
        - name
        - type
      properties:
        id:
          type: integer
          format: int32
          description: "Device ID"
        name:
          type: string
          description: "Device name"
        type:
          $ref: "#/components/schemas/DeviceType"

    DeviceInput:
      type: object
      required:
        - name
        - type
      properties:
        name:
          type: string
          description: "Device name"
        type:
          $ref: "#/components/schemas/DeviceType"

    DeviceFeatureType:
      type: string
      enum:
        - mic
        - camera
      x-enum-varnames:
        - DeviceFeatureTypeMic
        - DeviceFeatureTypeCamera
      description: "Device feature type"

    DeviceFeatureStatus:
      type: string
      enum:
        - inactive
        - active
      x-enum-varnames:
        - DeviceFeatureStatusInactive
        - DeviceFeatureStatusActive
      description: "Device feature status"

    DeviceFeature:
      type: object
      required:
        - id
        - type
        - status
      properties:
        id:
          type: integer
          format: int32
          description: "Feature ID"
        type:
          $ref: "#/components/schemas/DeviceFeatureType"
        status:
          $ref: "#/components/schemas/DeviceFeatureStatus"
        lastActive:
          type: string
          format: date-time
          description: "Last active timestamp in RFC3339 format"

    DeviceFeatureInput:
      type: object
      required:
        - type
        - status
      properties:
        type:
          $ref: "#/components/schemas/DeviceFeatureType"
        status:
          $ref: "#/components/schemas/DeviceFeatureStatus"

    CallState:
      type: string
      enum:
        - inactive
        - active
      x-enum-varnames:
        - CallStateInactive
        - CallStateActive
      description: "Call state for the user"

    CallStatus:
      type: array
      items:
        $ref: "#/components/schemas/UserStatus"

    UserStatus:
      type: object
      required:
        - user
        - state
        - devices
      properties:
        user:
          $ref: "#/components/schemas/User"
        state:
          $ref: "#/components/schemas/CallState"
        devices:
          type: array
          items:
            $ref: "#/components/schemas/DeviceStatus"

    DeviceStatus:
      allOf:
        - $ref: "#/components/schemas/Device"
        - type: object
          required:
            - features
          properties:
            features:
              type: array
              items:
                $ref: "#/components/schemas/DeviceFeature"

    ErrorResponse:
      type: object
      required:
        - err_code
      properties:
        err_code:
          type: string
          description: "Error code"
          enum:
            - internal
            - unknown
            - "not found"
            - "not impl"
            - unauthorized
            - "bad json"
            - "invalid url param"
            - duplicate
